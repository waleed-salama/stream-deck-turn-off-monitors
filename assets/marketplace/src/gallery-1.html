<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./base.css" />
  </head>
  <body>
    <div class="canvas">
      <div class="shell"></div>
      <div style="position:absolute; left:120px; top:120px;">
        <div class="eyebrow">Stream Deck Plugin</div>
        <h1 class="title">Turn Off Displays</h1>
        <p class="subtitle">Sleep all connected macOS displays instantly from a single Stream Deck key, without putting your Mac to sleep.</p>
      </div>

      <div class="device">
        <div class="grid">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell active">
            <img class="mini-art" src="../../icons/sleep-icon.svg" alt="Turn Off Displays key icon" />
          </div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
      </div>

      <div class="monitor-panel">
        <div class="monitor-base"></div>
      </div>
    </div>
  </body>
</html>
