<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./base.css" />
    <style>
      .canvas { width: 288px; height: 288px; }
      .shell { inset: 0; border-radius: 68px; }
      .icon-badge {
        position: absolute;
        inset: 0;
        width: 288px;
        height: 288px;
        border-radius: 68px;
        background: transparent;
        border: none;
        box-shadow: none;
      }
      .icon-monitor { inset: 54px; width: 180px; height: 180px; }
      .icon-moon { top: 42px; right: 42px; width: 64px; height: 64px; }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="shell"></div>
      <div class="icon-badge">
        <img class="badge-art" src="../../icons/sleep-icon.svg" alt="Turn Off Displays icon" />
      </div>
    </div>
  </body>
</html>
