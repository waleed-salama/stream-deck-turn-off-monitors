<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Turn Off Displays Settings</title>
    <link rel="stylesheet" href="./turn-off-displays.css" />
  </head>
  <body>
    <main class="panel">
      <section class="setting">
        <label class="toggle-row" for="manageAudioWhileAway">
          <span class="copy">
            <span class="label">Mute And Restore Audio</span>
            <span class="hint">Saves the current output volume, mutes while the displays are asleep, then restores the previous state when the Mac becomes active again.</span>
          </span>
          <input id="manageAudioWhileAway" type="checkbox" />
        </label>
      </section>
    </main>

    <script src="./turn-off-displays.js"></script>
  </body>
</html>
